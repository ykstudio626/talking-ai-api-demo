<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おはなしチャッピー</title>
</head>
<body>
  <h1>おはなしチャッピー</h1>
  <span class="sm-text">※会話の記録は行なっていません。自由にお楽しみください！</span>
  <span class="sm-text"><a href="https://github.com/ykstudio626/talking-ai-api-demo" target="_blank">GitHub</a></span>

  <div id="controls">
    <button id="startBtn">▶ 会話を開始</button>
    <button id="stopBtn" disabled>⏹ 会話を終了</button>
  </div>

  <div id="logContainer"></div>

  <div id="avatarWrapper">
    <canvas id="avatarCanvas"></canvas>
    <div id="avatarLoading">
      <div style="text-align:center">
        <img src="./loading.gif" alt="読み込み中…" /><br>
        <span style="font-size:13px; color:#888;">アバター読み込み中、少しお待ちください…</span>
      </div>
    </div>
    <div id="chatContainer"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
