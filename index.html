<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TalkingAI</title>
<style>
  /* --- ページ全体のデザイン --- */
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto,
                 "Hiragino Kaku Gothic ProN", "Noto Sans JP",
                 "Yu Gothic", sans-serif;
    margin: 12px;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: inherit; }

  #controls { margin-bottom: 8px; }
  button { margin-right: 8px; margin-bottom: 6px; padding: 8px 12px; }

  /* 会話表示エリア */
  #chatContainer {
    width: 100%;
    max-width: 800px;
    margin-top: 8px;
    border: 1px solid #eee;
    padding: 12px;
    height: 60vh;
    overflow: auto;
    background: #fff;
  }
  #chatContainer p { margin: 6px 0; padding: 8px; border-radius: 6px; }
  .ai   { background: #f0f0f0; text-align: left;  white-space: pre-wrap; }
  .user { background: #d4edff; text-align: right; white-space: pre-wrap; }

  #logContainer {
    margin-top: 10px;
    color: #444;
    font-size: 13px;
    max-width: 800px;
  }

  /* スマホ（600px以下） */
  @media (max-width: 600px) {
    button { padding: 10px 14px; font-size: 15px; }
  }
</style>
</head>
<body>
<h1>TalkingAI</h1>

<!-- ボタン類 -->
<div id="controls">
  <button id="startBtn">▶ 会話を開始</button>
  <button id="stopBtn" disabled>⏹ 会話を終了</button>
</div>

<!-- 簡易ログを表示するエリア -->
<div id="logContainer"></div>

<h2>会話</h2>
<div id="chatContainer"></div>

<script>
/* ===============================
   設定
================================ */
const PROXY_URL = "/api/session";

// true にするとイベントをブラウザコンソールにログ出力する
const EVENT_LOG = true;

let pc = null; // RTCPeerConnection（WebRTCの本体）
let dc = null; // DataChannel（イベント受信用）

// 会話表示用
const chatContainer = document.getElementById("chatContainer");
// item_idごとに<p>要素を管理する
const aiParagraphs = new Map();

// ボタンの動作を登録
document.getElementById("startBtn").onclick = startSession;
document.getElementById("stopBtn").onclick = stopSession;

/* ===============================
   セッション開始処理
================================ */
async function startSession() {
  try {
    // WebRTC接続を作成
    pc = new RTCPeerConnection();

    // --- AIからの音声を再生する用のaudioタグを作成 ---
    const audioEl = document.createElement("audio");
    audioEl.autoplay = true;
    document.body.appendChild(audioEl);

    // リモート音声を受け取ったら(ontrack)audioタグにセット
    pc.ontrack = (event)=>{
      audioEl.srcObject = event.streams[0];
      console.log("🎧 Remote audio track received");
    };

    // --- マイク入力を取得して送信 ---
    const micStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    micStream.getTracks().forEach(track=>pc.addTrack(track,micStream));
    console.log("🎤 Mic input added");

    // --- DataChannelを作成（AIからのイベント受信用） ---
    dc = pc.createDataChannel("oai-events");
    dc.onopen = ()=>{
      console.log("✅ Data channel open");
      log("セッション開始しました。");
      document.getElementById("stopBtn").disabled = false;
      document.getElementById("startBtn").disabled = true;
      // ユーザー音声の文字起こしを有効化
      dc.send(JSON.stringify({
        type: "session.update",
        session: { input_audio_transcription: { model: "whisper-1" } }
      }));
    };

    // DataChannelで受け取ったメッセージ（JSON形式）
    dc.onmessage = (evt)=>{
      const msg = JSON.parse(evt.data);
      const eventName = msg && msg.type ? String(msg.type) : "unknown";

      // EVENT_LOG が true のときコンソールにイベントを出力
      if(EVENT_LOG) console.log(`📩 [${eventName}]`, msg);

      /* --- 会話表示ロジック --- */
      // 1) conversation.item.created → role に応じて<p>要素を準備
      if(msg.type === "conversation.item.created" && msg.item && msg.item.id){
        const itemId = msg.item.id;
        const role = msg.item.role; // "user" or "assistant"
        if(!aiParagraphs.has(itemId)){
          const p = document.createElement("p");
          if(role === "user"){
            // ユーザー発話は先に DOM に追加（順序を確保するため）
            p.className = "user";
            p.textContent = "You: …";
            chatContainer.appendChild(p);
            scrollToBottom();
            aiParagraphs.set(itemId, { p, appended: true });
          } else {
            p.className = "ai";
            p.textContent = "";
            aiParagraphs.set(itemId, { p, appended: false });
          }
        }
      }

      // 2) response.audio_transcript.delta → 途中の文字列を受信
      if(msg.type === "response.audio_transcript.delta"){
        const itemId = msg.item_id || (msg.item && msg.item.id);
        const deltaText = msg.delta || msg.text || "";
        if(!deltaText) return;

        let entry = itemId ? aiParagraphs.get(itemId) : undefined;

        if(!entry){
          // 念のため遅れて作成
          const p = document.createElement("p");
          p.className = "ai";
          p.textContent = "AI: " + deltaText;
          chatContainer.appendChild(p);
          aiParagraphs.set(itemId || ("unknown_" + Date.now()), { p, appended: true });
          scrollToBottom();
        } else {
          if(!entry.appended){
            // 最初の文字列が来たら<p>をDOMに追加
            entry.p.textContent = "AI: " + deltaText;
            chatContainer.appendChild(entry.p);
            entry.appended = true;
            scrollToBottom();
          } else {
            // 文字をどんどん追記
            entry.p.textContent += deltaText;
            scrollToBottom();
          }
        }
      }

      // 3) ユーザーの発話文字起こし完了 → プレースホルダーを実際のテキストに更新
      if(msg.type === "conversation.item.input_audio_transcription.completed"){
        const itemId = msg.item_id;
        const transcript = (msg.transcript || "").trim();
        const entry = itemId ? aiParagraphs.get(itemId) : null;
        if(entry && transcript){
          entry.p.textContent = "You: " + transcript;
        } else if(!entry && transcript){
          // フォールバック（item が見つからない場合）
          const p = document.createElement("p");
          p.className = "user";
          p.textContent = "You: " + transcript;
          chatContainer.appendChild(p);
          scrollToBottom();
        }
      }

      // 4) response.audio_transcript.done → 確定したらMapから削除
      if(msg.type === "response.audio_transcript.done"){
        const itemId = msg.item_id || (msg.item && msg.item.id);
        if(!itemId) return;
        const entry = aiParagraphs.get(itemId);
        if(entry){
          if(entry.appended){
            entry.p.textContent = entry.p.textContent.trim();
          }
          aiParagraphs.delete(itemId);
        }
      }
    };

    // --- SDPを使ったWebRTCハンドシェイク ---
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // プロキシ経由でOpenAIにOfferを送信 → Answerを取得（APIキーはサーバーサイドで付与）
    const sdpResponse = await fetch(PROXY_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/sdp" },
      body: offer.sdp
    });

    const answer = { type:"answer", sdp: await sdpResponse.text() };
    await pc.setRemoteDescription(answer);
    console.log("🎤 Session started");

  } catch(err){
    console.error("❌ Error:",err);
    log("エラーが発生しました。詳細はコンソールを確認してください。");
  }
}

/* ===============================
   セッション終了処理
================================ */
function stopSession(){
  if(dc){ dc.close(); dc=null; }
  if(pc){ pc.close(); pc=null; }
  log("セッションを終了しました。");
  console.log("🛑 Session stopped");

  document.getElementById("stopBtn").disabled=true;
  document.getElementById("startBtn").disabled=false;
  aiParagraphs.clear();
}

/* ===============================
   補助関数
================================ */
function log(msg){
  const div=document.getElementById("logContainer");
  const p=document.createElement("p");
  p.textContent=msg;
  div.appendChild(p);
}

// チャット欄を下にスクロール
function scrollToBottom(){
  chatContainer.scrollTop = chatContainer.scrollHeight;
}
</script>
</body>
</html>
